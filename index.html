<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>猫咪连连看</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Microsoft YaHei}
h1{color:#fff;margin-bottom:16px}
.game{display:grid;grid-template-columns:repeat(6,70px);gap:6px;background:#333;padding:10px;border-radius:10px}
.item{width:70px;height:70px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.item img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.item.selected{transform:scale(1.08);box-shadow:0 0 0 2px #ffdf4f}
.item.removed{opacity:0;transform:scale(0);pointer-events:none}
.status{color:#fff;margin-top:12px}
</style>
</head>
<body>
<h1>🐱 猫咪连连看</h1>
<div class="game" id="game"></div>
<div class="status" id="tip">点击相同猫咪消除</div>

<script>
const game = document.getElementById('game');
const tip = document.getElementById('tip');

// 两只猫咪图片（已内置，别人打开也能看到）
const cats = [
"https://p.qqan.com/up/2021-7/16256236238934385.jpg",
"https://p.qqan.com/up/2021-7/16256236247734886.jpg"
];

const R = 6, C = 6;
let grid = [];
let nodes = [];
let first = null;

init();

function init(){
  game.innerHTML = '';
  grid = [];
  nodes = [];
  first = null;
  tip.textContent = "点击相同猫咪消除";

  let total = R * C;
  let list = [];
  for(let i=0;i<total/2;i++) list.push(i%2, i%2);
  for(let i=list.length-1;i>0;i--){
    let j = Math.random()*(i+1)|0;
    [list[i], list[j]] = [list[j], list[i]];
  }

  let idx = 0;
  for(let r=0;r<R;r++){
    grid[r] = [];
    nodes[r] = [];
    for(let c=0;c<C;c++){
      let id = list[idx++];
      grid[r][c] = id;
      let div = document.createElement('div');
      div.className = 'item';
      let img = document.createElement('img');
      img.src = cats[id];
      div.appendChild(img);
      div.onclick = ()=>click(r,c);
      game.appendChild(div);
      nodes[r][c] = div;
    }
  }
}

function click(r,c){
  let me = nodes[r][c];
  if(!me || me.classList.contains('removed')) return;
  if(!first){
    first = {r,c,el:me};
    me.classList.add('selected');
    tip.textContent = "再点另一个相同猫咪";
    return;
  }

  let {r:r1,c:c1,el:el1} = first;
  el1.classList.remove('selected');
  let ok = grid[r1][c1] === grid[r][c];
  first = null;

  if(ok){
    el1.classList.add('removed');
    me.classList.add('removed');
    grid[r1][c1] = -1;
    grid[r][c] = -1;
    tip.textContent = "消除成功！";
    setTimeout(checkWin,200);
  }else{
    tip.textContent = "不一样，重新选";
  }
}

function checkWin(){
  for(let r=0;r<R;r++)
    for(let c=0;c<C;c++)
      if(grid[r][c]!==-1) return;
  tip.textContent = "🎉 恭喜通关！";
  setTimeout(init,1400);
}
</script>
</body>
</html>
